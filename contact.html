<!DOCTYPE html>
<html lang="en">
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <meta name="robots" content="noindex">
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact</title>
    </head>
    <body>
        <header class="navbar">
            <h1 class="navbar-title">Brenden Lech</h1>
            <nav>
                <ul class="desktop-links menu-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="mobile-menu-icon" onclick="toggleMobileMenu(this)">&#x2261
                    <div class="mobile-menu">
                        <ul class="mobile-links menu-links">
                            <li><a href="index.html">Home</a></li>
                            <li><a href="contact.html">Contact</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
            <script src="mobile-menu.js"></script>
        </header>
        <div class="navbar-buffer"></div>
        <div class="main-content">
            <div class="contact-form-box">
                <h3>Contact Me</h3>
                <h4>Want to get in touch? Leave a message here, and I'll get back to you as soon as possible.<br><br></h4>
                <form id="contact-form" action="https://formspree.io/f/xdobbgnj" method="POST">
                    <label>
                        <input class="form-input" placeholder="Enter Email" type="email" name="email">
                    </label>
                    <br>
                    <label>
                        <textarea placeholder="Enter Message (Required)" class="form-input" name="message" rows="8" required=""></textarea>
                    </label>
                    <br>
                    <button type="submit">Submit</button>
                    <script>
                        window.onbeforeunload = () => {
                            document.getElementById('contact-form').reset();
                        }
                    </script>
                </form>
            </div>
        </div>
    </body>
</html>
